<svg xmlns="http://www.w3.org/2000/svg" xmlns:xhtml="http://www.w3.org/1999/xhtml" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>

    <!-- ══ GRADIENTES ══ -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#0d1f1f;stop-opacity:1"/>
      <stop offset="60%"  style="stop-color:#1a3535;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2A5757;stop-opacity:1"/>
    </linearGradient>

    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#E0922B;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f5a84b;stop-opacity:0"/>
    </linearGradient>

    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:rgba(255,255,255,0.07);stop-opacity:1"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.01);stop-opacity:1"/>
    </linearGradient>

    <radialGradient id="glowCircle" cx="70%" cy="20%" r="50%">
      <stop offset="0%"   style="stop-color:#E0922B;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#E0922B;stop-opacity:0"/>
    </radialGradient>

    <!-- ══ FILTROS ══ -->
    <filter id="textShadow" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000000" flood-opacity="0.6"/>
    </filter>

    <filter id="softShadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <filter id="orangeGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="cardShadow" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="0" dy="24" stdDeviation="40" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <!-- ══ CSS TIPOGRAFÍA CORPORATIVA ══ -->
    <style>
      .titular-style {
        font-family: 'Segoe UI', 'Helvetica Neue', 'Arial', sans-serif;
        font-size: 68px;
        font-weight: 800;
        fill: #FFFFFF;
        letter-spacing: -1.5px;
      }
      .subtitulo-style {
        font-family: 'Segoe UI', 'Helvetica Neue', 'Arial', sans-serif;
        font-size: 30px;
        font-weight: 400;
        fill: #E0922B;
        letter-spacing: 3px;
        text-transform: uppercase;
      }
      .cuerpo-style {
        font-family: 'Segoe UI', 'Helvetica Neue', 'Arial', sans-serif;
        font-size: 23px;
        font-weight: 300;
        fill: rgba(255,255,255,0.80);
        line-height: 1.6;
        letter-spacing: 0.3px;
      }
      .label-style {
        font-family: 'Segoe UI', 'Helvetica Neue', 'Arial', sans-serif;
        font-size: 13px;
        font-weight: 600;
        fill: rgba(255,255,255,0.35);
        letter-spacing: 5px;
        text-transform: uppercase;
      }
      .brand-style {
        font-family: 'Segoe UI', 'Helvetica Neue', 'Arial', sans-serif;
        font-size: 15px;
        font-weight: 600;
        fill: rgba(255,255,255,0.45);
        letter-spacing: 6px;
        text-transform: uppercase;
      }
      .color-dinamico { fill: #E0922B; }
    </style>
  </defs>

  <!-- ══ FONDO ══ -->
  <rect width="1080" height="1080" fill="url(#bgGrad)"/>

  <!-- Glow radial ambiental -->
  <rect width="1080" height="1080" fill="url(#glowCircle)"/>

  <!-- ══ GEOMETRÍA DECORATIVA ══ -->

  <!-- Cuadrícula sutil -->
  <g opacity="0.04" stroke="white" stroke-width="1">
    <line x1="270"  y1="0" x2="270"  y2="1080"/>
    <line x1="540"  y1="0" x2="540"  y2="1080"/>
    <line x1="810"  y1="0" x2="810"  y2="1080"/>
    <line x1="0" y1="270"  x2="1080" y2="270"/>
    <line x1="0" y1="540"  x2="1080" y2="540"/>
    <line x1="0" y1="810"  x2="1080" y2="810"/>
  </g>

  <!-- Círculos decorativos esquina superior derecha -->
  <circle cx="980" cy="100" r="300" fill="none" stroke="rgba(224,146,43,0.12)" stroke-width="1.5"/>
  <circle cx="980" cy="100" r="220" fill="none" stroke="rgba(224,146,43,0.08)" stroke-width="1"/>
  <circle cx="980" cy="100" r="140" fill="rgba(224,146,43,0.04)"/>

  <!-- Círculo decorativo esquina inferior izquierda -->
  <circle cx="100" cy="980" r="240" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <circle cx="100" cy="980" r="160" fill="rgba(255,255,255,0.02)"/>

  <!-- Polígono diagonal fondo izquierdo -->
  <polygon points="0,0 320,0 220,1080 0,1080" fill="rgba(255,255,255,0.025)"/>

  <!-- Puntos decorativos naranja -->
  <g fill="#E0922B" opacity="0.4" filter="url(#orangeGlow)">
    <circle cx="950" cy="420" r="5"/>
    <circle cx="975" cy="395" r="3.5"/>
    <circle cx="935" cy="450" r="3"/>
    <circle cx="965" cy="460" r="4.5"/>
    <circle cx="985" cy="440" r="2.5"/>
  </g>

  <!-- ══ BARRA LATERAL IZQUIERDA (acento naranja) ══ -->
  <rect x="0" y="0" width="10" height="1080" fill="url(#accentGrad)" class="color-dinamico" rx="0"/>

  <!-- ══ CARD DE CONTENIDO (glassmorphism) ══ -->
  <rect x="60" y="130" width="960" height="700" rx="20" fill="url(#cardGrad)"
        stroke="rgba(255,255,255,0.08)" stroke-width="1" filter="url(#cardShadow)"/>

  <!-- ══ ÁREA DE LOGO/ELEMENTOS IA ══ -->
  <g id="capa_elementos"/>

  <!-- ══ ETIQUETA SUPERIOR ══ -->
  <text x="110" y="185" class="label-style">Comunicación Corporativa · Garza</text>

  <!-- Línea separadora top -->
  <line x1="110" y1="198" x2="970" y2="198" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- ══ ACENTO LATERAL TITULAR ══ -->
  <rect x="110" y="225" width="6" height="80" fill="#E0922B" class="color-dinamico" rx="3" filter="url(#orangeGlow)"/>

  <!-- ══ TITULAR ══ -->
  <text x="136" y="293" class="titular-style" filter="url(#textShadow)">{{titular}}</text>

  <!-- Línea divisora naranja -->
  <rect x="136" y="315" width="100" height="3.5" fill="#E0922B" class="color-dinamico" rx="2"/>

  <!-- ══ SUBTITULO ══ -->
  <text x="136" y="380" class="subtitulo-style" filter="url(#softShadow)">{{subtitulo}}</text>

  <!-- ══ CUERPO (foreignObject para auto-wrap) ══ -->
  <foreignObject x="110" y="415" width="860" height="340">
    <xhtml:div style="
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      font-size: 23px;
      font-weight: 300;
      color: rgba(255,255,255,0.80);
      line-height: 1.65;
      letter-spacing: 0.3px;
      padding: 0 26px 0 26px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    ">{{cuerpo}}</xhtml:div>
  </foreignObject>

  <!-- ══ BARRA HORIZONTAL INFERIOR DE SEPARACIÓN ══ -->
  <rect x="60" y="858" width="960" height="1.5" fill="rgba(255,255,255,0.07)" rx="1"/>

  <!-- ══ FRANJA INFERIOR MARCA ══ -->
  <rect x="0" y="900" width="1080" height="180" fill="rgba(0,0,0,0.35)"/>

  <!-- Acento naranja inferior -->
  <rect x="60" y="900" width="6" height="180" fill="#E0922B" class="color-dinamico" opacity="0.7"/>

  <!-- Texto marca inferior -->
  <text x="90" y="978" class="brand-style">Garza Document Generator</text>
  <text x="90" y="1008" font-family="'Segoe UI',Arial,sans-serif" font-size="14" fill="rgba(255,255,255,0.25)" letter-spacing="2">Impulsado por Inteligencia Artificial · Serie Profesional</text>

  <!-- Línea naranja decorativa inferior derecha -->
  <rect x="820" y="950" width="200" height="2" fill="url(#accentGrad)" rx="1" opacity="0.6"/>
</svg>
