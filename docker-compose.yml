version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: vario_postgres
    restart: always
    environment:
      POSTGRES_USER: vario_user
      POSTGRES_PASSWORD: vario_password
      POSTGRES_DB: vario_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: vario_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
